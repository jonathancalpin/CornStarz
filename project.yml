name: CornStarz
options:
  bundleIdPrefix: com.lnhenterprises
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  CornStarz:
    type: application
    platform: iOS
    sources:
      - path: CornStarz
    resources:
      - path: CornStarz/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lnhenterprises.CornStarz
        INFOPLIST_FILE: CornStarz/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: false
    dependencies: []
    entitlements:
      path: CornStarz/CornStarz.entitlements
      properties: {}

  CornStarzTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CornStarzTests
    dependencies:
      - target: CornStarz
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lnhenterprises.CornStarzTests

  CornStarzUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CornStarzUITests
    dependencies:
      - target: CornStarz
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lnhenterprises.CornStarzUITests

schemes:
  CornStarz:
    build:
      targets:
        CornStarz: all
        CornStarzTests: [test]
        CornStarzUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CornStarzTests
        - CornStarzUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
